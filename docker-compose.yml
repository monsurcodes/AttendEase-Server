services:
  db:
    image: postgres:17
    container_name: attendease_postgres
    restart: always
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=attendease
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: attendease_redis
    restart: always
    ports:
      - '6379:6379'

volumes:
  pgdata:
